services:
  app:
    build: .
    container_name: otpbud-backend
    restart: "no"
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    networks:
      - saas-network
  postgres:
    image: postgres:17
    container_name: otpbud-postgres
    restart: "no"
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - saas-network
  redis:
    image: redis:8
    container_name: otpbud-redis
    restart: "no"
    ports:
      - "6379:6379"
    env_file:
      - .env
    networks:
      - saas-network

networks:
  saas-network:

volumes:
  pgdata:
